<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gist redirect simulator</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --surface: #ffffff;
      --text: #17212b;
      --muted: #5d6a75;
      --line: #d5dce2;
      --field: #fbfcfd;
      --accent: #176b87;
      --accent-strong: #0f536a;
      --focus: rgba(191, 127, 18, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 1.35rem;
      font-weight: 700;
    }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(210px, 260px) auto;
      gap: 12px;
      align-items: end;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .iri-control {
      display: flex;
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field);
      overflow: hidden;
    }

    .iri-prefix,
    input {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 0.9rem;
    }

    .iri-prefix {
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      padding: 0 12px;
      border-right: 1px solid var(--line);
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input {
      flex: 0 0 clamp(8.5rem, 20%, 12rem);
      width: clamp(8.5rem, 20%, 12rem);
      min-width: 8.5rem;
      min-height: 44px;
      padding: 0 12px;
      border: 0;
      background: transparent;
      color: var(--text);
    }

    select {
      width: 100%;
      min-height: 44px;
      padding: 0 40px 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field);
      color: var(--text);
    }

    button {
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    input:focus,
    select:focus,
    button:focus-visible,
    .iri-control:focus-within {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .error {
      min-height: 1.4em;
      margin: 10px 0 0;
      color: #8f2d23;
      font-size: 0.92rem;
    }

    @media (max-width: 860px) {
      form {
        grid-template-columns: 1fr;
      }

      input {
        flex-basis: 8.5rem;
        width: 8.5rem;
      }
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 20px, 1120px);
        padding-top: 20px;
      }

      form {
        padding: 12px;
      }

      .iri-control {
        flex-direction: column;
      }

      .iri-prefix {
        min-height: 36px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      input {
        flex: 1 1 auto;
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>gist redirect simulator</h1>

    <form id="redirect-form">
      <div>
        <label for="term">Term IRI</label>
        <div class="iri-control">
          <span class="iri-prefix" aria-hidden="true">https://w3id.org/semanticarts/ns/ontology/gist/</span>
          <input id="term" name="term" value="Account" autocomplete="off" autocapitalize="none" spellcheck="false" required>
        </div>
      </div>

      <div>
        <label for="mime">MIME type</label>
        <select id="mime" name="mime">
          <option value="text/turtle">text/turtle</option>
          <option value="application/rdf+xml">application/rdf+xml</option>
          <option value="application/ld+json">application/ld+json</option>
          <option value="application/json">application/json</option>
        </select>
      </div>

      <button type="submit">Submit</button>
    </form>

    <p id="error" class="error" role="alert"></p>
  </main>

  <script>
    const BASE_IRI = "https://w3id.org/semanticarts/ns/ontology/gist/";
    const formats = {
      "text/turtle": "ttl",
      "application/rdf+xml": "rdf",
      "application/ld+json": "jsonld",
      "application/json": "jsonld"
    };

    const form = document.getElementById("redirect-form");
    const termInput = document.getElementById("term");
    const mimeSelect = document.getElementById("mime");
    const error = document.getElementById("error");

    function normalizeTerm(value) {
      let term = value.trim();

      if (term.startsWith(BASE_IRI)) {
        term = term.slice(BASE_IRI.length);
      }

      term = term.replace(/^#/, "").trim();

      if (!term) {
        throw new Error("Enter a gist term.");
      }

      if (term.includes("/") || term.includes("\\") || term.includes("..")) {
        throw new Error("Use a single gist local name.");
      }

      if (!/^[A-Za-z0-9_.-]+$/.test(term)) {
        throw new Error("The term contains a character that is not valid in a generated file name.");
      }

      return term;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      error.textContent = "";

      try {
        const term = normalizeTerm(termInput.value);
        const extension = formats[mimeSelect.value];

        if (!extension) {
          throw new Error("Unsupported MIME type.");
        }

        termInput.value = term;
        window.location.href = `terms/${encodeURIComponent(term)}.${extension}`;
      } catch (exception) {
        error.textContent = exception.message;
      }
    });
  </script>
</body>
</html>
